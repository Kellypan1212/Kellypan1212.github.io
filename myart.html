<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品預覽</title>
    <link rel="stylesheet" href="lem.css">
</head>
<body class="myart-page">
    <div id="site-nav"></div>

    <main class="page-content">
        <!-- 作品預覽內容 -->

        <section class="work-list">
            <article class="work-card" data-href="works.html" tabindex="0" onclick="if(!event.target.closest('a')) location.href='works.html'" onkeydown="if((event.key==='Enter'||event.key===' ') && document.activeElement===this){ event.preventDefault(); location.href='works.html'; }">
                <div class="work-cover">
                    <img src="ph/works/yellow/IMG_3770 2.JPG" alt="作品封面">
                </div>

                <div class="work-info">
                    <h2 class="work-title">原創</h2>
                    <div class="work-cats">
                        <div>巫師 × 惡魔</div>
                        <div>白 × 小黑</div>
                        <div>其他OC</div>
                    </div>
                </div>
                <a href="works.html" class="work-cta" role="button" aria-label="前往作品詳情">查看更多 <span class="cta-arrow">→</span></a>
            </article>

            <article class="work-card" data-href="fanart.html" tabindex="0" onclick="if(!event.target.closest('a')) location.href='fanart.html'" onkeydown="if((event.key==='Enter'||event.key===' ') && document.activeElement===this){ event.preventDefault(); location.href='fanart.html'; }">
                <div class="work-cover">
                    <img src="ph/fanart/mcyt/IMG_0619.JPG" alt="作品封面">
                </div>

                <div class="work-info">
                    <h2 class="work-title">二創</h2>
                    <div class="work-cats">
                        <div>MCYT</div>
                        <div>Hollow Knight</div>
                        <div>其他二創</div>
                    </div>
                </div>
                <a href="fanart.html" class="work-cta" role="button" aria-label="前往作品詳情">查看更多 <span class="cta-arrow">→</span></a>
            </article>
        </section>
        
    </main>
    <script src="js/site.js"></script>
</body>
</html>
