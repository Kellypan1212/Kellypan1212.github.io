<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二創</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="lem.css">
    <style>
        .gallery-wrap{ max-width:1200px; margin: 0 auto; padding: 12px var(--page-padding); box-sizing: border-box; }
        .gallery-title{ margin: 0 0 clamp(24px, 4vw, 32px); font-size: clamp(1.6rem, 4.5vw, 2.2rem); font-weight:700; letter-spacing:0.08em; color:#fff; text-align:center; }
        .gallery-grid{
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(10px, 2vw, 16px);
            align-items: start;
        }
        .thumb{
            width:100%;
            aspect-ratio: 1 / 1;
            overflow:hidden;
            border-radius:10px;
            background:#0f0f0f;
            display:inline-grid;
            place-items:center;
            cursor:pointer;
            position:relative;
            box-shadow: 0 8px 18px rgba(0,0,0,0.45);
            transition: transform 0.28s ease, box-shadow 0.28s ease;
            border:1px solid rgba(255,255,255,0.03);
        }
        .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
        .thumb:hover{ transform: translateY(-6px) scale(1.02); box-shadow:0 30px 60px rgba(0,0,0,0.6); }
        .thumb-placeholder{
            color: rgba(255,255,255,0.78);
            font-size: 0.95rem;
            text-align:center;
            padding: 6px 10px;
            line-height:1.2;
        }
        /* R18 card: hover blur + overlay text */
        .r18-card{ display:inline-grid; position:relative; overflow:hidden; border-radius:10px; }
        .r18-card img{ width:100%; height:100%; object-fit:cover; display:block; transition: filter 0.24s ease, transform 0.24s ease; }
        .r18-card .r18-overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1rem; background: rgba(0,0,0,0.35); opacity:0; transition: opacity 0.22s ease; pointer-events:none; }
        .r18-card:hover img{ filter: blur(4px) brightness(0.8); transform: scale(1.02); }
        .r18-card:hover .r18-overlay{ opacity:1; pointer-events:none; }

        .lb-overlay{ position:fixed; inset:0; background: rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; pointer-events:none; transition: opacity 0.28s ease; }
        .lb-overlay.is-open{ opacity:1; pointer-events:auto; }
        .lb-content{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; overflow:hidden; }
        /* during drag we temporarily disable the image transition for smooth follow */
        .lb-image.no-transition { transition: none !important; }
        .lb-content .lb-image{ position:relative; left:auto; top:auto; will-change: auto; max-width: calc(100% - 40px); max-height: calc(100% - 40px); }
        .lb-image{ display:block; width:auto; height:auto; max-width:100%; max-height:100%; box-shadow: 0 30px 60px rgba(0,0,0,0.6); transition: transform 0.16s ease; transform-origin: center center; }
        .lb-image.zoomed{ transform: scale(2); }
        .lb-close{ position:fixed; top:18px; right:18px; background: rgba(255,255,255,0.06); color:#fff; border:0; padding:8px 10px; font-size:18px; border-radius:8px; cursor:pointer; backdrop-filter: blur(6px); z-index:1002; }
        .lb-close:hover{ transform: translateY(-4px); }
        /* zoom toggle button placed left of close */
        .lb-zoom{ position:fixed; top:18px; right:72px; background: rgba(255,255,255,0.06); color:#fff; border:0; padding:8px 10px; font-size:16px; border-radius:8px; cursor:pointer; backdrop-filter: blur(6px); z-index:1002; }
        .lb-zoom:hover{ transform: translateY(-4px); }
        .lb-nav{ position:fixed; top:50%; transform:translateY(-50%); background: rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.08); width:64px; height:64px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:28px; z-index:1001; cursor:pointer; box-shadow: 0 6px 18px rgba(0,0,0,0.45); }
        .lb-nav:hover{ background: rgba(255,255,255,0.16); color:#000; border-color: rgba(255,255,255,0.18); }
        .lb-prev{ left:22px; }
        .lb-next{ right:22px; }

        @media (max-width:1100px){ .gallery-grid{ grid-template-columns: repeat(4,1fr); } }
        @media (max-width:820px){ .gallery-grid{ grid-template-columns: repeat(3,1fr); } }
        @media (max-width:560px){ .gallery-grid{ grid-template-columns: repeat(2,1fr); } }
        @media (max-width:380px){ .gallery-grid{ grid-template-columns: repeat(1,1fr); } }
    </style>
</head>
<body>
    <div id="site-nav" class="navbar navbar-expand-lg"></div>

    <main class="page-content myart-page">
        <section class="gallery-wrap">
            <h1 class="gallery-title">FANART</h1>
            <div class="gallery-grid" id="galleryGrid">
            </div>
        </section>

        <div id="lightbox" class="lb-overlay" aria-hidden="true">
            <div class="lb-content" role="dialog" aria-modal="true">
                <button class="lb-zoom btn btn-outline-light" id="lbZoom" aria-label="縮放">🔍</button>
                <button class="lb-close btn btn-outline-light" id="lbClose" aria-label="關閉">✕</button>
                <img src="" alt="預覽圖片" id="lbImage" class="lb-image">
            </div>
            <button class="lb-nav lb-prev btn btn-light" id="lbPrev" aria-label="上一張">‹</button>
            <button class="lb-nav lb-next btn btn-light" id="lbNext" aria-label="下一張">›</button>
        </div>
    </main>

    <script>
        (async function(){
            const grid = document.getElementById('galleryGrid');
            try{
                const res = await fetch('phoo.html');
                if(!res.ok) throw new Error('phoo.html 無法載入');
                const text = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const srcs = Array.from(doc.querySelectorAll('img'))
                    .map(img => img.getAttribute('src'))
                    .filter(Boolean);
                const unique = [...new Set(srcs)];

                if(unique.length === 0){
                    const note = document.createElement('p');
                    note.style.color = 'rgba(255,255,255,0.6)';
                    note.textContent = 'phoo.html 中未找到圖片，請檢查 phoo.html 或放入圖片。';
                    grid.appendChild(note);
                    return;
                }

                // 選取 hh 底下的前 9 張圖，並再從上方挑一張不同的圖，共 10 張
                const hhCandidates = unique.filter(s => s.includes('/hh/'));
                const hhSelected = hhCandidates.slice(0, 9);
                let extra = unique.find(s => !hhSelected.includes(s));
                if(!extra && unique.length > 0) extra = unique[0];
                const wanted = [...hhSelected];
                if(extra) wanted.push(extra);

                // 合併 unique 與 wanted，保持順序並去重，確保 wanted 的圖至少出現在清單中
                const finalList = [];
                const seen = new Set();
                unique.concat(wanted).forEach(s => { if(!seen.has(s)){ finalList.push(s); seen.add(s); }});

                // 將圖片清單存到全域變數以供 Lightbox 切換使用
                window.fanartImageList = finalList;

                // 移除 finalList 中的固定 R18 圖片（避免重複），但不立即插入卡片，會在縮圖生成完後再加入最後一個位置
                const fixedR18 = 'ph/fanart/fanR18/IMG_0840.JPG';
                const ix = finalList.indexOf(fixedR18);
                if(ix !== -1) finalList.splice(ix, 1);

                finalList.forEach((src, idx) => {
                    const thumb = document.createElement('button');
                    thumb.className = 'thumb';
                    thumb.type = 'button';

                    const imgEl = document.createElement('img');
                    imgEl.src = src;
                    imgEl.setAttribute('data-full', src);
                    imgEl.alt = `Fanart ${idx+1}`;

                    thumb.appendChild(imgEl);

                    imgEl.addEventListener('error', ()=>{
                        imgEl.style.display = 'none';
                        if(!thumb.querySelector('.thumb-placeholder')){
                            const ph = document.createElement('div');
                            ph.className = 'thumb-placeholder';
                            ph.textContent = `請將 ${src} 放置到此位置（或修正 phoo.html 的路徑）`;
                            thumb.appendChild(ph);
                        }
                    });

                    thumb.addEventListener('click', ()=>{
                        if(getComputedStyle(imgEl).display === 'none') return;
                        openLightboxByIndex(idx);
                    });

                    grid.appendChild(thumb);
                });

                // 在所有縮圖生成完成後，把固定 R18 卡片加入為最後一個（右下角）
                (function(){
                    const fixedR18 = 'ph/fanart/fanR18/IMG_0840.JPG';
                    const a = document.createElement('a');
                    a.className = 'r18-card thumb';
                    a.href = 'https://x.com/cgouo_nsfw';
                    a.target = '_blank';
                    a.rel = 'noopener';
                    a.setAttribute('aria-label','查看 R18 作品');

                    const imgEl = document.createElement('img');
                    imgEl.src = fixedR18;
                    imgEl.alt = 'R18 作品';

                    const overlay = document.createElement('div');
                    overlay.className = 'r18-overlay';
                    overlay.textContent = '查看 R18 作品';

                    a.appendChild(imgEl);
                    a.appendChild(overlay);

                    grid.appendChild(a);
                })();

            }catch(err){
                console.error(err);
                const note = document.createElement('p');
                note.style.color = 'rgba(255,255,255,0.6)';
                note.textContent = '載入 phoo.html 時發生錯誤，請確認檔案存在於網站根目錄。';
                grid.appendChild(note);
            }
        })();

        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lbImage');
        const lbClose = document.getElementById('lbClose');
        const lbZoom = document.getElementById('lbZoom');
        // zoom / pan state
        let isZoomed = false;
        let scale = 1;
        let tx = 0, ty = 0; // pan offsets in px
        const MIN_SCALE = 1;
        const MAX_SCALE = 4;
        // suppress overlay clicks briefly after drag/animation
        let suppressOverlayClickUntil = 0;

        function openLightbox(src, alt){
            lbImg.src = src;
            lbImg.alt = alt || '';
            lbImg.style.width = '';
            lbImg.style.height = '';
            lbImg.style.transform = '';
            lb.classList.add('is-open');
            lb.setAttribute('aria-hidden','false');
            document.body.style.overflow = 'hidden';
            lbClose.focus();
        }

        function closeLightbox(){
            lb.classList.remove('is-open');
            lb.setAttribute('aria-hidden','true');
            lbImg.src = '';
            lbImg.style.width = '';
            lbImg.style.height = '';
            lbImg.style.transform = '';
            document.body.style.overflow = '';
            currentIndex = -1;
        }

        lbClose.addEventListener('click', closeLightbox);
        // 點擊遮罩（圖片以外區域）關閉：若點擊目標不是圖片、也不是導航或關閉按鈕，則關閉
        lb.addEventListener('click', (e)=>{
            if(Date.now() < suppressOverlayClickUntil) return; // 被拖曳或動畫阻擋的短時段
            const t = e.target;
            if(t === lbImg) return; // 點圖片不關閉
            if(t === lbClose) return; // 點關閉按鈕由其 handler 處理
            if(t === lbZoom) return; // 點縮放按鈕不關閉
            if(t.closest && t.closest('.lb-nav')) return; // 點左右按鈕不關閉
            // 其他位置（含 .lb-content 的空白處）視為背景，關閉 lightbox
            closeLightbox();
        });

        // image list & navigation
        let currentIndex = -1;
        function showImageAt(idx){
            const list = window.fanartImageList || [];
            if(!list || list.length === 0) return;
            currentIndex = ((idx % list.length) + list.length) % list.length;
            // reset zoom/pan state when switching images
            isZoomed = false; scale = 1; tx = 0; ty = 0;
            lbImg.src = list[currentIndex];
            lbImg.alt = `Fanart ${currentIndex+1}`;
            lbImg.style.width = '';
            lbImg.style.height = '';
            lbImg.style.transform = '';
        }
        function openLightboxByIndex(idx){
            showImageAt(idx);
            lb.classList.add('is-open');
            lb.setAttribute('aria-hidden','false');
            document.body.style.overflow = 'hidden';
            lbClose.focus();
        }
        const lbPrev = document.getElementById('lbPrev');
        const lbNext = document.getElementById('lbNext');
        if(lbPrev) lbPrev.addEventListener('click', (e)=>{ e.stopPropagation(); const list = window.fanartImageList || []; if(list.length===0) return; currentIndex = (currentIndex - 1 + list.length) % list.length; showImageAt(currentIndex); });
        if(lbNext) lbNext.addEventListener('click', (e)=>{ e.stopPropagation(); const list = window.fanartImageList || []; if(list.length===0) return; currentIndex = (currentIndex + 1) % list.length; showImageAt(currentIndex); });

        document.addEventListener('keydown', (e)=>{
            if(!lb.classList.contains('is-open')) return;
            if(e.key === 'Escape') { closeLightbox(); return; }
            const list = window.fanartImageList || [];
            if(list.length === 0) return;
            if(e.key === 'ArrowLeft'){
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                showImageAt(currentIndex);
            } else if(e.key === 'ArrowRight'){
                currentIndex = (currentIndex + 1) % list.length;
                showImageAt(currentIndex);
            }
        });

        // Unified interaction: wheel behaves as zoom when zoomed, else vertical wheel switches images. Drag behaves as pan when zoomed, otherwise drag-to-switch.
        (function(){
            // wheel throttling for switching when not zoomed
            let wheelLocked = false;
            const THROTTLE_MS = 160;

            function applyTransform(){
                // when scaled, use translate(tx,ty) scale(scale), otherwise clear transform
                if(isZoomed && scale !== 1){
                    lbImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
                } else {
                    lbImg.style.transform = '';
                }
            }

            // wheel handler
            lb.addEventListener('wheel', function(e){
                if(!lb.classList.contains('is-open')) return;
                const list = window.fanartImageList || [];
                if(isZoomed){
                    // zoom in/out around cursor
                    e.preventDefault();
                    const rect = lbImg.getBoundingClientRect();
                    const cx = e.clientX - rect.left; // cursor pos in image coords
                    const cy = e.clientY - rect.top;
                    const prevScale = scale;
                    const delta = -e.deltaY; // invert so wheel up zooms in
                    const Z_STEP = 0.12; // fine control
                    if(delta > 0) scale = Math.min(MAX_SCALE, +(scale + Z_STEP).toFixed(3));
                    else scale = Math.max(MIN_SCALE, +(scale - Z_STEP).toFixed(3));

                    // adjust pan so zoom centers at cursor
                    const relX = (cx - rect.width/2 - tx) / prevScale;
                    const relY = (cy - rect.height/2 - ty) / prevScale;
                    tx = tx - relX * (scale - prevScale);
                    ty = ty - relY * (scale - prevScale);

                    applyTransform();
                    return;
                }

                // not zoomed: use vertical wheel to navigate (throttled)
                e.preventDefault();
                if(wheelLocked) return;
                const delta = e.deltaY;
                if(Math.abs(delta) < 2) return;
                if(list.length === 0) return;
                if(delta > 0){ currentIndex = (currentIndex + 1) % list.length; }
                else { currentIndex = (currentIndex - 1 + list.length) % list.length; }
                showImageAt(currentIndex);
                wheelLocked = true;
                setTimeout(()=>{ wheelLocked = false; }, THROTTLE_MS);
            }, { passive: false });

            // prevent default drag
            lbImg.ondragstart = () => false;

            // pointer interactions
            let pointerActive = false;
            let pId = null;
            let startX = 0, startY = 0;
            let lastTx = 0, lastTy = 0;
            let dx = 0, dy = 0;
            const SWIPE_THRESHOLD = Math.max(120, Math.round(window.innerWidth * 0.12));

            function onPointerDown(e){
                if(!lb.classList.contains('is-open')) return;
                if(e.pointerType === 'mouse' && e.button !== 0) return;
                pId = e.pointerId;
                pointerActive = true;
                startX = e.clientX;
                startY = e.clientY;
                dx = 0; dy = 0;
                try{ e.target.setPointerCapture(pId); }catch(_){ }

                if(isZoomed && scale > 1){
                    // start pan
                    lastTx = tx; lastTy = ty;
                    lbImg.classList.add('no-transition');
                    lbImg.style.cursor = 'grabbing';
                } else {
                    // start swipe (drag-to-switch)
                    lbImg.classList.add('no-transition');
                }
            }

            function onPointerMove(e){
                if(!pointerActive || e.pointerId !== pId) return;
                dx = e.clientX - startX;
                dy = e.clientY - startY;
                if(isZoomed && scale > 1){
                    tx = lastTx + dx;
                    ty = lastTy + dy;
                    applyTransform();
                } else {
                    const max = window.innerWidth * 1.2;
                    const txVis = Math.max(Math.min(dx, max), -max);
                    lbImg.style.transform = `translateX(${txVis}px)`;
                }
            }

            function onPointerUp(e){
                if(!pointerActive || e.pointerId !== pId) return;
                pointerActive = false;
                try{ e.target.releasePointerCapture(pId); }catch(_){ }
                lbImg.classList.remove('no-transition');
                lbImg.style.cursor = '';

                if(isZoomed && scale > 1){
                    // pan ended: no snapping, just keep position
                    suppressOverlayClickUntil = Date.now() + 150;
                    return;
                }

                // handle swipe-to-switch
                const absdx = Math.abs(dx);
                if(absdx > SWIPE_THRESHOLD){
                    const swipedLeft = dx < 0; // left swipe => next, right swipe => previous
                    const list = window.fanartImageList || [];
                    if(list.length > 0){
                        const outX = swipedLeft ? -window.innerWidth : window.innerWidth; // current image moves in swipe direction
                        lbImg.style.transition = 'transform 0.16s ease';
                        lbImg.style.transform = `translateX(${outX}px)`;

                        setTimeout(()=>{
                            // update index according to swipe
                            if(swipedLeft) currentIndex = (currentIndex + 1) % list.length;
                            else currentIndex = (currentIndex - 1 + list.length) % list.length;

                            const incomingX = swipedLeft ? window.innerWidth : -window.innerWidth; // incoming image starts opposite

                            // position incoming image off-screen without transition
                            lbImg.style.transition = 'none';
                            lbImg.style.transform = `translateX(${incomingX}px)`;

                            // swap image
                            lbImg.src = list[currentIndex];
                            lbImg.alt = `Fanart ${currentIndex+1}`;

                            // animate incoming image to center
                            requestAnimationFrame(()=>{
                                requestAnimationFrame(()=>{
                                    lbImg.style.transition = 'transform 0.16s ease';
                                    lbImg.style.transform = '';
                                });
                            });

                            // clear inline transition after animation
                            setTimeout(()=>{ lbImg.style.transition = ''; }, 220);
                        }, 160);

                        suppressOverlayClickUntil = Date.now() + 300;
                    }
                } else {
                    lbImg.style.transition = 'transform 0.12s ease';
                    lbImg.style.transform = '';
                    setTimeout(()=>{ lbImg.style.transition = ''; }, 160);
                    suppressOverlayClickUntil = Date.now() + 160;
                }

                dx = dy = 0; pId = null;
            }

            // attach listeners
            lbImg.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);
            window.addEventListener('pointercancel', onPointerUp);

            // double click on image: toggle zoom in/out centered at click
            lbImg.addEventListener('dblclick', function(e){
                if(!lb.classList.contains('is-open')) return;
                const rect = lbImg.getBoundingClientRect();
                const cx = e.clientX - rect.left; // cursor pos in image coords
                const cy = e.clientY - rect.top;
                const prevScale = scale;
                if(!isZoomed){
                    // zoom in centered at cursor
                    const TARGET_SCALE = 2; // default double-click zoom
                    isZoomed = true;
                    scale = Math.min(MAX_SCALE, TARGET_SCALE);
                    // compute relative coordinates and adjust pan so cursor remains focused
                    const relX = (cx - rect.width/2 - tx) / (prevScale || 1);
                    const relY = (cy - rect.height/2 - ty) / (prevScale || 1);
                    tx = tx - relX * (scale - prevScale);
                    ty = ty - relY * (scale - prevScale);
                    lbImg.style.transition = 'transform 0.12s ease';
                    applyTransform();
                    setTimeout(()=>{ lbImg.style.transition = ''; }, 160);
                } else {
                    // reset to original
                    isZoomed = false;
                    scale = 1; tx = 0; ty = 0;
                    lbImg.style.transition = 'transform 0.12s ease';
                    applyTransform();
                    setTimeout(()=>{ lbImg.style.transition = ''; }, 160);
                }
                // suppress overlay click right after double-click to prevent accidental close
                suppressOverlayClickUntil = Date.now() + 220;
            });

            // zoom toggle button
            if(lbZoom) lbZoom.addEventListener('click', function(){
                if(!lb.classList.contains('is-open')) return;
                if(!isZoomed){
                    isZoomed = true; scale = 2; tx = 0; ty = 0;
                    lbImg.style.transition = 'transform 0.12s ease';
                    applyTransform();
                    setTimeout(()=>{ lbImg.style.transition = ''; }, 160);
                } else {
                    isZoomed = false; scale = 1; tx = 0; ty = 0;
                    lbImg.style.transition = 'transform 0.12s ease';
                    applyTransform();
                    setTimeout(()=>{ lbImg.style.transition = ''; }, 160);
                }
            });

            // ensure switching images resets zoom/pan state
            const originalShow = showImageAt;
            window.__showImageAt_orig = originalShow;
            function wrappedShowImageAt(idx){
                isZoomed = false; scale = 1; tx = 0; ty = 0;
                originalShow(idx);
                lbImg.style.transform = '';
            }
            window.showImageAt = wrappedShowImageAt;
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/site.js"></script>
</body>
</html>
