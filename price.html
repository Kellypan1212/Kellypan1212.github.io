<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>價目表</title>
    <link rel="stylesheet" href="lem.css">
</head>
<body>
    <div id="site-nav"></div>

    <main class="page-content">
        <section class="price-list">
            <h1 class="price-list-heading">COMMISSION</h1>

            <div class="photo-grid">
                <article class="photo-box" id="day-package">
                    <img src="img/657746246_893992547018157_3363821962379930125_n.jpg" alt="包天">
                    <div class="overlay-text">包天</div>
                    <div class="hover-info">
                        <span>6hr</span>
                        <span>價錢：5000$</span>
                    </div>
                </article>

                <article class="photo-box" id="detailed-illustration">
                    <img src="img/617728312_833207739763305_4519504809564729019_n.jpg" alt="精緻插圖">
                    <div class="overlay-text">精緻插圖</div>
                    <div class="hover-info">
                        <span>單人/雙人*2</span>
                        <span>價錢：5000$</span>
                    </div>
                </article>

                <article class="photo-box">
                    <img src="img/626609219_847426198341459_2977584444697287267_n.jpg" alt="摸魚頁">
                    <div class="overlay-text">摸魚頁</div>
                    <div class="hover-info">
                        <span>限單人</span>
                        <span>價錢：2400$</span>
                    </div>
                </article>

                <article class="photo-box">
                    <img src="img/590761415_793924943691585_845854808013081611_n.jpg" alt="吃小夥伴">
                    <div class="overlay-text">吃小夥伴</div>
                    <div class="hover-info">
                        <span>限單人</span>
                        <span>價錢：2600$</span>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script src="js/site.js"></script>
</body>
</html>
